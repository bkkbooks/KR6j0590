body:
  text: 大唐三藏法師玄奘奉詔譯如是我聞一時薄伽梵在淨居天上依空而住衆妙七寶莊嚴道場與無央數菩薩衆俱爾時世尊告諸菩薩善男子若欲利益安樂衆生汝當受此六門陀羅尼法謂我流轉於生死中諸所受苦勿令衆生同受斯苦諸有所受富貴世樂願諸衆生同受斯樂我所作惡若未先悔終不發言稱無上法我諸所有衆魔之業若未先覺終不舉心緣無上法我諸所有波羅蜜多所攝一切世及出世廣大善根願諸衆生皆當速證無上智果我證解脫亦願衆生皆得解脫勿令住著生死涅槃陀羅尼曰懺謎懺謎莫閉反羼諦羼諦跋迭麗跋迭麗穌跋迭麗穌跋迭麗諦誓諦誓戰迭麗戰迭麗戰迭邏伐底丁履反低殊伐底達磨伐底薩縛結隸鑠毗輸達儞薩縛阿剌託莎達儞末諾僧輸達儞莎訶若有清信善男子善女人能於日夜六時讀誦如是六門陀羅尼者此人所有一切業障皆悉消滅疾悟阿耨多羅三藐三菩提時薄伽梵説是經已一切菩薩摩訶薩及諸天衆聞佛所説皆大歡喜信受奉行
